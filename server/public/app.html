<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership Center</title>
  <link rel="stylesheet" href="/static/common.css" />
</head>
<body>
  <div class="page-shell">
    <div class="bg-decoration" aria-hidden="true">
      <div class="float-circle circle-a"></div>
      <div class="float-circle circle-b"></div>
    </div>

    <main class="dashboard-wrap">
      <header class="top-nav">
        <div>
          <span class="tag" id="service-tag"></span>
          <h1 id="app-title">会员中心</h1>
          <div class="muted" id="app-subtitle"></div>
        </div>
        <div class="inline-actions">
          <button id="feature-home-btn" class="secondary-btn" type="button">回到功能首页</button>
          <button id="refresh-btn" class="secondary-btn" type="button">刷新数据</button>
          <a id="admin-link" class="secondary-btn" href="#" style="text-decoration:none;display:inline-flex;align-items:center;">管理后台</a>
          <button id="logout-btn" class="secondary-btn" type="button">退出登录</button>
        </div>
      </header>

      <div id="page-message" class="message"></div>

      <section class="grid-2">
        <article class="card">
          <h2>账号信息</h2>
          <dl class="kv" id="user-kv">
            <dt>UID</dt><dd id="user-uid">-</dd>
            <dt>用户名</dt><dd id="user-name">-</dd>
            <dt>角色</dt><dd id="user-role">-</dd>
            <dt>服务分区</dt><dd id="user-service">-</dd>
            <dt>注册时间</dt><dd id="user-created">-</dd>
          </dl>
        </article>

        <article class="card">
          <h2>Wallet / Credits</h2>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="label">当前余额</div>
              <p class="value" id="credits-balance">0</p>
            </div>
            <div class="stat-box">
              <div class="label">累计充值次数</div>
              <p class="value" id="recharge-count">0</p>
            </div>
          </div>
          <p class="muted" style="margin-top: 10px;">
            说明：当前钱包代币单位为 <strong>credits</strong>。对接卡密系统后，调用预留接口即可自动入账。
          </p>
        </article>
      </section>

      <section class="card" style="margin-top:16px;">
        <h2>用户充值记录</h2>
        <!-- <p class="muted">仅保留用户侧需要的数据：卡密字符串、对应面值、充值时间。</p> -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>卡密字符串</th>
                <th>对应面值</th>
                <th>充值 credits</th>
                <th>充值时间</th>
              </tr>
            </thead>
            <tbody id="recharge-tbody"></tbody>
          </table>
        </div>
      </section>

      <section class="card" style="margin-top:16px;">
        <h2>充值接口预留信息</h2>
        <p class="muted">外部系统对接时，建议调用以下接口（当前已可用）：</p>
        <div class="table-wrap">
          <table>
            <tbody>
              <tr>
                <th style="width: 200px;">接口地址</th>
                <td id="api-endpoint">-</td>
              </tr>
              <tr>
                <th>请求方法</th>
                <td>POST</td>
              </tr>
              <tr>
                <th>关键字段</th>
                <td>uid、卡密字符串、对应面值、售价、有效期、批次号</td>
              </tr>
              <tr>
                <th>效果</th>
                <td>钱包 credits 入账 + 用户简版记录 + 管理后台全量记录</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/api/runtime-config.js"></script>
  <script src="/static/shared.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
